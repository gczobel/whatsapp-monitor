version: 2

updates:
  # npm dependencies — paused until codebase stabilizes
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
    groups:
      # vitest and its coverage plugin must be bumped together — exact peer deps
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      type-definitions:
        patterns:
          - '@types/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
