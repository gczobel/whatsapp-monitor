version: 2

updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
    groups:
      # vitest and its coverage plugin must be bumped together — they have exact peer deps
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      # Batch all @types/* updates into a single PR
      type-definitions:
        patterns:
          - '@types/*'
      # Batch ESLint ecosystem updates together
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
