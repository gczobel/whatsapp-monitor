name: Stale

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  stale:
    name: Label and close stale issues and PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has had no activity for 30 days and has been marked as stale.
            It will be closed in 7 days unless there is new activity.
          stale-pr-message: >
            This pull request has had no activity for 30 days and has been marked as stale.
            It will be closed in 7 days unless there is new activity.
          close-issue-message: >
            This issue was closed automatically after 37 days of inactivity.
          close-pr-message: >
            This pull request was closed automatically after 37 days of inactivity.
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,security
