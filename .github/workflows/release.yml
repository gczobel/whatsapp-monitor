name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        id: release
        run: |
          ./node_modules/.bin/semantic-release
          # Capture the tag semantic-release just created (empty if no release)
          NEW_TAG=$(git -c 'versionsort.suffix=-' ls-remote --tags --sort='v:refname' origin 'v*' \
            | tail -1 | sed 's/.*refs\/tags\///' | sed 's/\^{}//')
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.release.outputs.new_tag != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.release.outputs.new_tag != ''
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: steps.release.outputs.new_tag != ''
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gczobel/whatsappgroup
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.new_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.new_tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.release.outputs.new_tag != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
