name: Dependency Review

on:
  pull_request:
    branches: ['**']

jobs:
  dependency-review:
    name: Scan new dependencies for CVEs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
